<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小亞諾英文單字王</title>
    <style>
        :root {
            --primary: #3B7FB9; 
            --secondary: #B5EAD7;
            --accent: #FFDAC1; 
            --correct: #2ecc71;
            --wrong: #e74c3c;
            --text: #444;
            --key-base-width: 60px;
            
            --finger-l4: #FFD1DC;
            --finger-l3: #FFECB3;
            --finger-l2: #C8E6C9;
            --finger-l1: #BBDEFB;
            --finger-r1: #D1C4E9;
            --finger-r2: #F8BBD0;
            --finger-r3: #DCEDC8;
            --finger-r4: #E0F2F1;

            --bg: #EBF5FB;
            --card-bg: #ffffff;
            --card-border: #eeeeee;
            --input-bg: #ffffff;
            --text-main: #444;
            --text-muted: #888;
            --kb-bg: #dddddd;
            --kb-border: #bbbbbb;
            --key-bg: #ffffff;
            --sidebar-bg: #ffffff;
        }

        body.dark {
            --bg: #1a1e2e;
            --card-bg: #252a3a;
            --card-border: #333a50;
            --input-bg: #1e2332;
            --text-main: #e0e6f0;
            --text-muted: #8899aa;
            --kb-bg: #1a1e2e;
            --kb-border: #333a50;
            --key-bg: #2e3450;
            --sidebar-bg: #252a3a;
            background-color: var(--bg);
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden; /* body本身鎖定不滾動 */
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            display: flex;
            transition: background-color 0.3s, color 0.3s;
            color: var(--text-main);
        }

        /* ══ 漢堡選單按鈕 ══ */
        .menu-toggle {
            position: fixed; left: 20px; top: 20px; font-size: 30px; cursor: pointer;
            z-index: 2000; background: var(--card-bg); border: none;
            color: var(--primary); border-radius: 50%; width: 55px; height: 55px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: background 0.3s;
            touch-action: manipulation;
        }

        /* ══ 深色模式切換 ══ */
        #dark-mode-toggle {
            position: fixed; right: 20px; top: 20px;
            font-size: 22px; cursor: pointer;
            z-index: 2000; background: var(--card-bg); border: none;
            border-radius: 50%; width: 50px; height: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: background 0.3s, transform 0.3s;
            touch-action: manipulation;
        }
        #dark-mode-toggle:hover { transform: rotate(20deg) scale(1.1); }

        /* ══ 側邊欄 ══ */
        #sidebar {
            width: 280px;
            height: 100%;
            background-color: var(--sidebar-bg);
            box-shadow: 4px 0 20px rgba(0,0,0,0.15);
            position: fixed;
            left: -350px;
            top: 0;
            transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1500;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 讓子元素負責滾動 */
        }
        #sidebar.open { left: 0; }
        
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            padding-top: 80px; /* 讓漢堡按鈕不擋到 */
            border-bottom: 1px solid var(--card-border);
            color: var(--primary);
            flex-shrink: 0;
        }
        .home-icon-btn {
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 10px;
            transition: 0.2s;
            touch-action: manipulation;
        }
        .home-icon-btn:hover { background: var(--card-border); transform: scale(1.1); }

        /* ★ 修正：側邊欄內容可滾動 */
        .sidebar-content {
            flex: 1 1 auto;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* iOS 慣性滾動 */
            overscroll-behavior: contain;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .sidebar-content::-webkit-scrollbar { width: 4px; }
        .sidebar-content::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 2px; }

        .btn {
            width: 100%; background-color: var(--secondary); border: none; padding: 15px;
            border-radius: 15px; font-size: 1.1rem; cursor: pointer; font-weight: bold;
            color: #4A7C6E; box-shadow: 0 4px 0 #95CBB9; margin-bottom: 5px; flex-shrink: 0;
            font-family: inherit;
            transition: transform 0.1s, box-shadow 0.1s;
            touch-action: manipulation;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #95CBB9; }

        /* ══ 主畫面 ══ */
        #main-view {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #home-logo { text-align: center; }
        .logo-icon { 
            font-size: 10rem; 
            margin-bottom: 20px; 
            display: block;
            filter: drop-shadow(0 10px 10px rgba(59,127,185,0.3));
            animation: swim 3s infinite ease-in-out;
        }
        .logo-text { 
            font-size: 4.5rem; 
            font-weight: 900; 
            color: #3B7FB9;
            text-shadow: 3px 3px 0px #FFDAC1, 6px 6px 0px rgba(0,0,0,0.05);
        }
        @keyframes swim {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        #top-info-bar {
            position: absolute; top: 30px; width: 80%;
            display: flex; justify-content: space-between; align-items: center;
        }
        #total-progress-container {
            width: 60%; height: 25px; background: var(--card-border);
            border-radius: 20px; overflow: hidden;
            border: 3px solid var(--card-border); display: none;
        }
        #total-progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }
        #timer-display { font-size: 2rem; font-weight: bold; color: #FF6B6B; display: none; }
        #counter-display { font-size: 2rem; font-weight: bold; color: #3B7FB9; display: none; }

        #word-area { text-align: center; width: 100%; display: none; }
        
        #word-display { 
            font-size: 8vw; 
            font-weight: bold; 
            margin-bottom: 10px; 
            color: var(--text-muted); 
            transition: color 0.2s;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            min-height: 1.2em;
        }

        .char-box {
            display: inline-block;
            min-width: 0.8em;
            border-bottom: 6px solid var(--card-border); 
            text-align: center;
            line-height: 1.1;
        }
        .char-box.space { border-bottom: none; min-width: 0.4em; }

        #translation-display {
            font-size: 2.2rem; color: var(--text-muted);
            margin-bottom: 25px; font-weight: bold; height: 3rem;
        }

        .char-correct { color: var(--correct); }
        .char-wrong { color: var(--wrong) !important; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .shake-kb { animation: shake 0.3s ease-in-out; }
        .shake-error { animation: shake 0.3s ease-in-out; }

        #input-box { 
            font-size: 2.5rem; padding: 12px 30px; border-radius: 60px; 
            border: 6px solid var(--primary); outline: none; text-align: center; 
            width: 85%; max-width: 450px; 
            background: var(--input-bg); 
            color: var(--text-main);
            font-family: inherit;
            transition: background 0.3s, color 0.3s;
        }

        #keyboard-area { display: none; text-align: center; width: 100%; max-width: 1000px; }
        .keyboard {
            display: flex; flex-direction: column; gap: 8px;
            background: var(--kb-bg); padding: 15px; border-radius: 20px;
            border: 4px solid var(--kb-border);
        }
        .kb-row { display: flex; gap: 6px; justify-content: center; }
        .key {
            width: 55px; height: 55px; background: var(--key-bg); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: bold;
            border-bottom: 5px solid #aaa; position: relative; transition: all 0.2s;
            color: var(--text-main);
        }
        .key.f-key::after, .key.j-key::after {
            content: ''; position: absolute; bottom: 10px; left: 50%;
            width: 18px; height: 3px; background: #999;
            transform: translateX(-50%); border-radius: 2px;
        }
        .key.highlight { 
            background: #FF4D4D !important; 
            color: white !important; 
            border-color: #B30000; 
            transform: scale(1.25); 
            z-index: 10;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.6);
            border-bottom-width: 2px;
        }

        #pre-game-start { 
            text-align: center; background: var(--card-bg); padding: 40px; border-radius: 30px; 
            border: 8px solid var(--accent); display: none; 
            transition: background 0.3s;
        }
        #pre-game-start h1, #pre-game-start p { color: var(--text-main); }

        /* ══ Modal 通用樣式 ★修正滾動★ ══ */
        .modal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center; align-items: center;
            z-index: 2500;
            padding: 20px;          /* 防止貼邊 */
            overflow-y: auto;       /* modal背景本身可滾動 */
            -webkit-overflow-scrolling: touch;
        }
        .modal-content { 
            background: var(--card-bg); padding: 30px; border-radius: 35px;
            width: 100%; max-width: 480px; text-align: center;
            border: 10px solid var(--accent);
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            color: var(--text-main);
            transition: background 0.3s;
            max-height: 90vh;           /* ★ 高度上限 */
            overflow-y: auto;           /* ★ 內容超出時滾動 */
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            margin: auto;               /* 垂直置中 */
        }

        /* 結果畫面 */
        #result-layer {
            display: none;
            position: fixed;
            background: var(--bg);
            width: 100%; height: 100%;
            top: 0; left: 0;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            z-index: 3000;
            text-align: center;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* ══ 自訂 modal 小元件 ══ */
        .word-row {
            display: flex; gap: 8px; margin-bottom: 8px; align-items: center;
        }
        .word-row input {
            padding: 10px; border-radius: 8px; border: 1px solid var(--card-border);
            width: 42%; font-size: 1rem; font-family: inherit;
            background: var(--input-bg); color: var(--text-main);
        }
        
        #saved-lists-display {
            padding-top: 10px;
            display: flex;
            flex-direction: column;
        }

        .list-item { 
            background: var(--card-bg); 
            border: 2px solid var(--secondary); 
            padding: 12px; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-weight: bold; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            position: relative; 
            z-index: 1;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            color: var(--text-main);
            touch-action: manipulation;
        }
        .list-item:hover { transform: translateY(-4px); z-index: 100; box-shadow: 0 8px 16px rgba(0,0,0,0.12); }
        .delete-btn {
            color: #e74c3c; cursor: pointer; font-size: 1.2rem;
            border: none; background: none; padding: 5px;
            touch-action: manipulation;
        }

        input[type="number"] {
            font-family: inherit; border: 2px solid var(--primary);
            border-radius: 10px; padding: 5px; color: var(--primary);
            font-weight: bold; background: var(--input-bg);
        }
        
        #exam-results-box {
            width: 80%; max-width: 500px; background: var(--card-bg);
            border: 4px solid var(--accent); border-radius: 20px;
            padding: 15px; margin: 15px 0; text-align: left;
        }
        .error-item { margin-bottom: 10px; border-bottom: 1px dashed var(--card-border); padding-bottom: 5px; }
        .error-eng { color: var(--wrong); font-weight: bold; font-size: 1.4rem; }
        .error-chi { color: var(--text-muted); margin-left: 10px; }

        /* ══ 複習清單徽章 ══ */
        #review-badge {
            display: none;
            background: #FF6B6B; color: white;
            border-radius: 50%; width: 22px; height: 22px;
            font-size: 0.75rem; font-weight: bold;
            align-items: center; justify-content: center;
            position: absolute; top: -5px; right: -5px;
        }
        .review-btn-wrap { position: relative; display: inline-block; width: 100%; }

        /* ══ 音效開關 ══ */
        #sound-toggle-wrap {
            display: flex; align-items: center; gap: 10px;
            background: var(--card-bg); border-radius: 15px; padding: 10px 15px;
            border: 2px solid var(--card-border);
            font-weight: bold; color: var(--text-muted); font-size: 1rem;
        }
        .toggle-switch { position: relative; width: 50px; height: 26px; display: inline-block; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; cursor: pointer; inset: 0;
            background: #ccc; border-radius: 26px; transition: 0.3s;
        }
        .toggle-slider:before {
            content: ""; position: absolute;
            width: 20px; height: 20px; left: 3px; bottom: 3px;
            background: white; border-radius: 50%; transition: 0.3s;
        }
        input:checked + .toggle-slider { background: var(--correct); }
        input:checked + .toggle-slider:before { transform: translateX(24px); }

        /* ══ 分享按鈕 ══ */
        #share-btn { background: #E8F4FD; color: var(--primary); box-shadow: 0 4px 0 #B2D8F0; width: 180px; }

        /* ══ 匯入匯出 ══ */
        #io-area { margin-top: 10px; }
        #io-area textarea {
            width: 100%; height: 80px; border-radius: 10px;
            border: 2px solid var(--card-border); padding: 8px;
            font-size: 0.8rem; font-family: monospace; resize: vertical;
            background: var(--input-bg); color: var(--text-main);
        }
        .io-btn-row { display: flex; gap: 8px; margin-top: 6px; }
        .io-btn {
            flex: 1; font-size: 0.85rem; padding: 8px; border-radius: 10px;
            border: none; cursor: pointer; font-family: inherit; font-weight: bold;
            touch-action: manipulation;
        }
        .io-export { background: var(--secondary); color: #4A7C6E; }
        .io-import { background: var(--accent); color: #855b3f; }

        /* ══ 答對動畫 ══ */
        @keyframes pop-correct {
            0% { transform: scale(1); }
            40% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .pop-anim { animation: pop-correct 0.25s ease-out; }

        /* ══ 複習 modal ══ */
        .review-word-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-radius: 10px; margin-bottom: 8px;
            background: var(--bg); border: 1px solid var(--card-border);
            font-size: 1rem; color: var(--text-main);
        }
        .review-del-btn {
            background: none; border: none; cursor: pointer;
            color: #e74c3c; font-size: 1.1rem;
            touch-action: manipulation;
        }

        /* ══ 側邊欄遮罩（點外部關閉） ══ */
        #sidebar-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 1400;
        }
        #sidebar-overlay.show { display: block; }

        /* ══ 平板 / 手機字型縮放 ══ */
        @media (max-width: 768px) {
            .logo-text { font-size: 2.5rem; }
            .logo-icon { font-size: 6rem; }
            #word-display { font-size: 12vw; }
            #input-box { font-size: 1.8rem; }
            .key { width: 38px; height: 38px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <button id="dark-mode-toggle" onclick="toggleDark()">🌙</button>
    <!-- 遮罩層，點外部關閉側邊欄 -->
    <div id="sidebar-overlay" onclick="closeSidebar()"></div>

    <div id="sidebar">
        <div class="sidebar-header">
            <span style="font-weight: bold; color: var(--primary);">🐳 冒險選單</span>
            <span class="home-icon-btn" onclick="location.reload()">🏠</span>
        </div>
        <div class="sidebar-content">
            <div id="sound-toggle-wrap">
                <span>🔈 答對音效</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="sound-toggle" checked onchange="toggleSound()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div style="color: var(--text-muted); font-size:0.8rem;">找字母練習</div>
            <button class="btn" style="background: var(--accent);" onclick="prepareBeginnerMode()">⌨️ 初心者模式</button>
            <div style="color: var(--text-muted); font-size:0.8rem;">單字挑戰</div>
            <button class="btn" onclick="openRandomModal('easy')">🌱 簡單模式</button>
            <button class="btn" onclick="openRandomModal('normal')">🌿 基礎模式</button>
            <button class="btn" onclick="openRandomModal('hard')">🌳 困難模式</button>
            <div style="color: var(--text-muted); font-size:0.8rem;">個人化學習</div>
            <button class="btn" style="background: #E2F0CB;" onclick="showCustomModal()">✏️ 自訂單字庫</button>
            <div class="review-btn-wrap">
                <button class="btn" style="background: #FFE8E8; color:#c0392b; box-shadow: 0 4px 0 #f5b7b1;" onclick="showReviewModal()">📌 待複習清單</button>
                <span id="review-badge">0</span>
            </div>
            <!-- 底部留白，確保最後項目不被截斷 -->
            <div style="height: 20px; flex-shrink: 0;"></div>
        </div>
    </div>

    <div id="main-view">
        <div id="top-info-bar">
            <div id="total-progress-container"><div id="total-progress-bar"></div></div>
            <div id="timer-display">時間：--:--</div>
            <div id="counter-display">正確：0</div>
        </div>

        <div id="home-logo">
            <div class="logo-icon">🐋</div>
            <div class="logo-text">小亞諾英文單字王</div>
            <p style="color: #5D8AA8; font-size: 1.5rem; margin-top: 20px; font-weight: bold;">點擊左上角 ☰ 開始練習吧！</p>
        </div>

        <div id="pre-game-start">
            <h1 id="pre-title" style="color: var(--primary); font-size: 3rem;"></h1>
            <p id="pre-desc" style="font-size: 1.2rem; color: var(--text-muted);"></p>
            <button class="btn" style="width: 200px; font-size: 1.5rem;" onclick="actualStartGame()">出發！</button>
        </div>

        <div id="word-area">
            <div id="word-display">READY?</div>
            <div id="translation-display"></div>
            <div style="display: flex; align-items: center; gap: 20px; justify-content: center;">
                <input type="text" id="input-box" placeholder="點我開始" autocomplete="off">
                <span style="font-size: 3.5rem; cursor: pointer; user-select: none;" onclick="speakCurrent()">🔊</span>
            </div>
            <div id="progress-text" style="margin-top: 25px; font-weight: bold; font-size: 1.5rem; color: var(--text-muted); display: none;"></div>
        </div>

        <div id="keyboard-area">
            <h1 id="kb-target" style="font-size: 6rem; color: #FF4D4D; margin-top: 0; margin-bottom: 20px;">?</h1>
            <div class="keyboard" id="virtual-keyboard"></div>
        </div>
    </div>

    <!-- 隨機挑戰 modal -->
    <div id="random-modal" class="modal">
        <div class="modal-content">
            <h3 id="random-title" style="color: var(--primary); font-size: 2rem; margin-top: 0;">模式</h3>
            <p style="font-size: 1.3rem; font-weight: bold; color: var(--text-muted);">設定時間 (分鐘)：<br><br>
                <input type="number" id="random-minutes" value="1" min="1" max="60" style="width:80px; font-size:1.8rem; text-align:center;">
            </p>
            <button class="btn" style="margin-top: 15px;" onclick="confirmRandomChallenge()">準備好了！</button>
            <button class="btn" style="background:#eee; margin-top:10px; color: #888; box-shadow: 0 4px 0 #ccc;" onclick="hideModal('random-modal')">關閉</button>
        </div>
    </div>
    
    <!-- 自訂單字庫 modal -->
    <div id="custom-modal" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--primary); font-size: 1.8rem; margin-top: 0;">✏️ 自訂單字庫管理</h3>
            <div id="list-creation-area">
                <input type="text" id="new-list-name" placeholder="清單名稱 (如：第五課單字)" style="width:90%; padding:10px; margin-bottom:12px; border-radius:10px; border:2px solid var(--primary); font-size: 1rem; font-family: inherit; background: var(--input-bg); color: var(--text-main);">
                <div id="custom-rows-container" style="max-height: 200px; overflow-y: auto; -webkit-overflow-scrolling: touch; margin-bottom:12px; border: 1px solid var(--card-border); padding: 10px; border-radius: 12px; background: var(--bg);">
                    <div class="word-row">
                        <input type="text" class="eng-in" placeholder="英文">
                        <input type="text" class="chi-in" placeholder="中文">
                        <button onclick="this.parentElement.remove()" style="border:none; background:none; cursor:pointer; color:#999;">❌</button>

                osc.start(); osc.stop(ctx.currentTime + 0.4);
            } catch(e) {}
        }

        function playErrorSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); osc.frequency.setValueAtTime(100, ctx.currentTime);
                const g = ctx.createGain(); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.connect(g); g.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } catch(e) {}
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isOpen = sidebar.classList.toggle('open');
            overlay.classList.toggle('show', isOpen);

        // ════════════════
        //  分享成績
        // ════════════════
        function shareResult() {
            let text = '';
            const modeMap = { easy: '🌱 簡單', normal: '🌿 基礎', hard: '🌳 困難' };
            if (gameState.mode === 'beginner') {
                text = `🐋 小亞諾英文單字王\n⌨️ 找字母挑戰\n抓到字母：${gameState.score} 個！`;
            } else if (gameState.subMode === 'random') {
                text = `🐋 小亞諾英文單字王\n${modeMap[gameState.currentDifficulty] || ''} 模式\n✅ 完成單字：${gameState.score} 個！`;
            } else {
                const pct = Math.round(gameState.score / gameState.currentList.length * 100);
                text = `🐋 小亞諾英文單字王\n📋 清單：${gameState.activeListName || '自訂'}\n答對率：${pct}% (${gameState.score}/${gameState.currentList.length})`;
                if (pct === 100) text += '\n💯 滿分！太厲害了！';
            }
            const feedback = document.getElementById('share-feedback');
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    feedback.textContent = '✅ 已複製到剪貼簿，快貼給同學看！';
                    setTimeout(() => feedback.textContent = '', 3000);
                }).catch(() => {
                    prompt('複製這段文字分享：', text);
                });
            } else {
                prompt('複製這段文字分享：', text);
            }
        }

        // ════════════════
        //  匯出 / 匯入
        // ════════════════
        function exportLists() {
            const data = JSON.stringify(gameState.customData, null, 2);
            document.getElementById('io-textarea').value = data;
        }
        function importLists() {
            const raw = document.getElementById('io-textarea').value.trim();
            if (!raw) return alert('請先貼上資料！');
            try {
                const parsed = JSON.parse(raw);
                let conflicts = [];
                for (let name in parsed) {
                    if (gameState.customData[name]) conflicts.push(name);
                }
                if (conflicts.length > 0) {
                    const ok = confirm(`以下清單已存在，匯入會覆蓋：\n${conflicts.join(', ')}\n\n確定要繼續嗎？`);
                    if (!ok) return;
                }
                Object.assign(gameState.customData, parsed);
                localStorage.setItem('user_custom_lists', JSON.stringify(gameState.customData));
                renderSavedLists();
                document.getElementById('io-textarea').value = '';
                alert(`✅ 匯入成功！共 ${Object.keys(parsed).length} 份清單。`);
            } catch(e) {
                alert('格式錯誤，請確認資料是正確的 JSON 格式。');
            }
        }

        // ════════════════
        //  待複習清單
        // ════════════════
        function getReviewList() {
            const raw = localStorage.getItem('review_list');
            return raw ? JSON.parse(raw) : [];
        }
        function saveReviewList(list) {
            localStorage.setItem('review_list', JSON.stringify(list));
            updateReviewBadge();
        }
        function addToReviewList(words) {
            const current = getReviewList();
            words.forEach(w => {
                const exists = current.find(item => item.eng === w);
                if (!exists) {
                    const chi = gameState.tempDictionary[w] || dictionary[w] || dictionary[w.toLowerCase()] || '';
                    current.push({ eng: w, chi });
                }
            });
            saveReviewList(current);
        }
        function updateReviewBadge() {
            const list = getReviewList();
            const badge = document.getElementById('review-badge');
            if (list.length > 0) {
                badge.textContent = list.length;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }
        }
        function showReviewModal() {
            closeSidebar();
            renderReviewList();
            showModal('review-modal');
        }
        function renderReviewList() {
            const list = getReviewList();
            const display = document.getElementById('review-list-display');
            if (list.length === 0) {
                display.innerHTML = '<p style="color:var(--text-muted); text-align:center;">目前沒有待複習的單字 🎉</p>';
                return;
            }
            display.innerHTML = list.map((item, i) => `
                <div class="review-word-item">
                    <span><strong>${item.eng}</strong> <span style="color:var(--text-muted); font-size:0.9rem;">${item.chi}</span></span>
                    <button class="review-del-btn" onclick="removeFromReview(${i})">❌</button>
                </div>
            `).join('');
        }
        function removeFromReview(index) {
            const list = getReviewList();
            list.splice(index, 1);
            saveReviewList(list);
            renderReviewList();
        }
        function startReviewPractice() {
            const list = getReviewList();
            if (list.length === 0) return alert('待複習清單是空的！');
            hideModal('review-modal');
            gameState.tempDictionary = {};
            gameState.currentList = [];
            list.forEach(item => {
                gameState.tempDictionary[item.eng] = item.chi;
                gameState.currentList.push(item.eng);
            });
            gameState.examErrors = [];
            gameState.testMode = true;
            gameState.examMode = true;
            gameState.activeListName = '待複習清單';
            clearUI();
            gameState.mode = 'word'; gameState.subMode = 'custom';
            document.getElementById('pre-title').innerText = '📌 待複習清單練習';

            document.getElementById('pre-game-start').style.display = 'block';
        }

        // ════════════════════════════════
        //  自訂單字庫
        // ════════════════════════════════
        function showCustomModal() { renderSavedLists(); showModal('custom-modal'); }
        function openRandomModal(diff) {
            gameState.currentDifficulty = diff;
            const titleMap = { easy: "🌱 簡單模式", normal: "🌿 基礎模式", hard: "🌳 困難模式" };
            document.getElementById('random-title').innerText = titleMap[diff];
            showModal('random-modal');
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US'; u.rate = 0.8;
            window.speechSynthesis.speak(u);
        }
        function speakCurrent() {
            if (gameState.currentList[gameState.currentIndex]) speak(gameState.currentList[gameState.currentIndex]);
        }

        function triggerKeyboardShake() {
            if (isCoolingDown) return;
            isCoolingDown = true;
            playErrorSound();
            const kbArea = document.getElementById('keyboard-area');
            kbArea.classList.remove('shake-kb');
            void kbArea.offsetWidth;
            kbArea.classList.add('shake-kb');
            setTimeout(() => { kbArea.classList.remove('shake-kb'); isCoolingDown = false; }, 370);
        }

        function prepareBeginnerMode() {
            closeSidebar(); clearUI();
            gameState.mode = 'beginner';
            gameState.pendingTimeLeft = 60; // ★ 記住初始時間
            document.getElementById('pre-title').innerText = "⌨️ 找字母挑戰";
            document.getElementById('pre-desc').innerText = "練習正確指法，亮紅色的按鍵要放大按下去喔！";
            document.getElementById('pre-game-start').style.display = 'block';
            lastChar = '';
        }

        function initKeyboard() {
            const kb = document.getElementById('virtual-keyboard');
            kb.innerHTML = '';
            kbRows.forEach(row => {
                const rowDiv = document.createElement('div'); rowDiv.className = 'kb-row';
                row.forEach(key => {
                    const kDiv = document.createElement('div');
                    kDiv.className = 'key' + (key==='F'?' f-key':'') + (key==='J'?' j-key':'');
                    kDiv.id = `key-${key}`; kDiv.innerText = key;
                    const finger = fingerMap[key];
                    if (finger) kDiv.style.backgroundColor = `var(--finger-${finger})`;
                    rowDiv.appendChild(kDiv);
                });
                kb.appendChild(rowDiv);
            });
        }

        function nextChar() {
            document.querySelectorAll('.key').forEach(k => k.classList.remove('highlight'));
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let newChar;
            do { newChar = chars[Math.floor(Math.random()*26)]; } while (newChar === lastChar);
            lastChar = newChar;
            gameState.targetChar = newChar;
            document.getElementById('kb-target').innerText = gameState.targetChar;
            const targetEl = document.getElementById(`key-${gameState.targetChar}`);
            if (targetEl) targetEl.classList.add('highlight');
        }

        function addNewWordRow() {
            const container = document.getElementById('custom-rows-container');
            const row = document.createElement('div'); row.className = 'word-row';
            row.innerHTML = `<input type="text" class="eng-in" placeholder="英文"><input type="text" class="chi-in" placeholder="中文"><button onclick="this.parentElement.remove()" style="border:none;background:none;cursor:pointer;color:#999;">❌</button>`;
            container.appendChild(row);
            // 自動滾到底部
            container.scrollTop = container.scrollHeight;
        }

        function saveCustomList() {
            const name = document.getElementById('new-list-name').value.trim();
            if (!name) return alert("請輸入清單名稱！");
            const rows = document.querySelectorAll('.word-row');
            let data = [];
            rows.forEach(r => {
                const eng = r.querySelector('.eng-in').value.trim().toLowerCase();
                const chi = r.querySelector('.chi-in').value.trim();
                if (eng && chi) data.push({ eng, chi });
            });
            if (data.length === 0) return alert("請輸入至少一組單字！");
            gameState.customData[name] = data;
            localStorage.setItem('user_custom_lists', JSON.stringify(gameState.customData));
            document.getElementById('new-list-name').value = "";
            document.getElementById('custom-rows-container').innerHTML = `<div class="word-row"><input type="text" class="eng-in" placeholder="英文"><input type="text" class="chi-in" placeholder="中文"><button onclick="this.parentElement.remove()" style="border:none;background:none;cursor:pointer;color:#999;">❌</button></div>`;
            renderSavedLists();
            alert("清單已儲存！");
        }

        function renderSavedLists() {
            const display = document.getElementById('saved-lists-display');
            display.innerHTML = "";
            const names = Object.keys(gameState.customData);
            if (names.length === 0) {
                display.innerHTML = '<p style="color:var(--text-muted); text-align:center; font-size:0.9rem;">還沒有自訂清單</p>';
                return;
            }
            names.forEach(name => {
                const item = document.createElement('div'); item.className = 'list-item';
                item.innerHTML = `<span>📂 ${name} <span style="color:var(--text-muted);font-size:0.8rem;">(${gameState.customData[name].length}個)</span></span><button class="delete-btn" onclick="deleteList(event,'${name}')">🗑️</button>`;
                item.onclick = (e) => { if (e.target.classList.contains('delete-btn')) return; openModeSelect(name); };
                display.appendChild(item);
            });
        }

        function deleteList(e, name) {
            e.stopPropagation();
            if (confirm(`確定要刪除「${name}」嗎？`)) {
                delete gameState.customData[name];
                localStorage.setItem('user_custom_lists', JSON.stringify(gameState.customData));
                renderSavedLists();
            }
        }

        function openModeSelect(name) {
            gameState.activeListName = name;
            document.getElementById('selected-list-title').innerText = name;
            showModal('mode-select-modal');
        }

        function launchCustomMode(type) {
            const repeat = parseInt(document.getElementById('custom-repeat-count').value) || 1;
            const data = gameState.customData[gameState.activeListName];
            if (!data || data.length === 0) return alert('清單是空的！');
            gameState.testMode = (type === 'test' || type === 'exam');
            gameState.examMode = (type === 'exam');
            gameState.repeatCount = repeat;
            gameState.currentList = [];
            gameState.tempDictionary = {};
            gameState.examErrors = [];
            data.forEach(item => {
                const key = item.eng.toLowerCase();
                gameState.tempDictionary[key] = item.chi;
                for (let i=0; i<repeat; i++) gameState.currentList.push(key);
            });
            hideModal('mode-select-modal');
            hideModal('custom-modal');
            closeSidebar(); clearUI();
            gameState.mode = 'word'; gameState.subMode = 'custom';
            let title = "📖 基礎練習";
            if (type==='test') title = "📝 拼字練習";
            if (type==='exam') title = "🎓 考試模式";
            document.getElementById('pre-title').innerText = title;
            document.getElementById('pre-desc').innerText = `清單：${gameState.activeListName}，共 ${gameState.currentList.length} 個單字。`;
            document.getElementById('pre-game-start').style.display = 'block';
        }

        function startErrorReTest() {
            const errorWords = [...new Set(gameState.examErrors)];
            if (errorWords.length === 0) return;
            // 保留 tempDictionary 以便查找中文
            gameState.currentList = [...errorWords];
            gameState.currentIndex = 0;
            gameState.score = 0;
            gameState.examErrors = [];
            clearUI();
            gameState.mode = 'word'; gameState.subMode = 'custom';
            gameState.testMode = true; gameState.examMode = true;
            document.getElementById('pre-title').innerText = "🎓 錯題加強測驗";
            document.getElementById('pre-desc').innerText = `針對打錯的 ${errorWords.length} 個單字練習。`;
            document.getElementById('pre-game-start').style.display = 'block';
        }

        // ════════════════════════════════
        //  ★ 核心修正：clearUI 不重置 pendingTimeLeft
        // ════════════════════════════════
        function clearUI() {
            gameState.active = false;
            if (gameState.timer) {
                clearInterval(gameState.timer);
                gameState.timer = null;
            }
            ['home-logo','pre-game-start','word-area','keyboard-area','result-layer','exam-results-box'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = 'none';
            });
            document.getElementById('timer-display').style.display = 'none';
            document.getElementById('counter-display').style.display = 'none';
            document.getElementById('total-progress-container').style.display = 'none';
            document.getElementById('progress-text').style.display = 'none';
            document.getElementById('re-test-errors-btn').style.display = 'none';
            document.getElementById('word-display').classList.remove('shake-error');
            document.getElementById('share-feedback').textContent = '';
        }

        // ════════════════════════════════
        //  ★ 核心修正：actualStartGame 從 pendingTimeLeft 重置計時器
        // ════════════════════════════════
        function actualStartGame() {
            document.getElementById('pre-game-start').style.display = 'none';
            document.getElementById('result-layer').style.display = 'none';

            // ★ 關鍵：每次開始都從 pendingTimeLeft 重設計時
            gameState.timeLeft = gameState.pendingTimeLeft;
            updateTimerDisplay();

            gameState.active = true;
            gameState.score = 0;
            gameState.currentIndex = 0;

            if (gameState.mode === 'beginner') {
                document.getElementById('keyboard-area').style.display = 'block';
                document.getElementById('timer-display').style.display = 'block';
                document.getElementById('counter-display').style.display = 'block';
                document.getElementById('counter-display').innerText = "得分：0";
                initKeyboard(); nextChar(); startTimer();
            } else {
                document.getElementById('word-area').style.display = 'block';
                document.getElementById('input-box').value = "";
                if (gameState.subMode === 'random') {
                    document.getElementById('timer-display').style.display = 'block';
                    document.getElementById('counter-display').style.display = 'block';
                    document.getElementById('counter-display').innerText = "正確：0";
                    gameState.currentList = [...dict[gameState.currentDifficulty]].sort(() => Math.random()-0.5);
                    startTimer();
                } else {
                    document.getElementById('total-progress-container').style.display = 'block';
                    document.getElementById('progress-text').style.display = 'block';
                }
                renderWord(); speakCurrent();
                setTimeout(() => document.getElementById('input-box').focus(), 300);
            }
        }

        function startTimer() {
            if (gameState.timer) clearInterval(gameState.timer);
            gameState.timer = setInterval(() => {
                gameState.timeLeft--;
                updateTimerDisplay();
                if (gameState.timeLeft <= 0) {
                    gameState.timeLeft = 0;
                    updateTimerDisplay();
                    endGame();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const t = Math.max(0, gameState.timeLeft);
            const m = Math.floor(t / 60);
            const s = t % 60;
            document.getElementById('timer-display').innerText = `時間：${m}:${s.toString().padStart(2,'0')}`;
        }

        function renderWord() {
            const word = gameState.currentList[gameState.currentIndex] || "";
            const userIn = document.getElementById('input-box').value;
            let html = "";
            for (let i=0; i<word.length; i++) {
                const char = word[i];
                const userInputChar = userIn[i];
                if (char === ' ') {
                    html += `<div class="char-box space">&nbsp;</div>`;
                } else {
                    let content = "", className = "";
                    if (userInputChar !== undefined) {
                        content = userInputChar;
                        if (!gameState.examMode)
                            className = (userInputChar === char) ? "char-correct" : "char-wrong";
                    } else {
                        content = gameState.testMode ? "&nbsp;" : char;
                    }
                    html += `<div class="char-box"><span class="${className}">${content}</span></div>`;
                }
            }
            document.getElementById('word-display').innerHTML = html;
            const trans = gameState.tempDictionary[word] || dictionary[word] || dictionary[word.toLowerCase()] || "(自定義)";
            document.getElementById('translation-display').innerText = trans;
            if (gameState.subMode === 'custom') {
                const total = gameState.currentList.length;
                document.getElementById('total-progress-bar').style.width = (gameState.currentIndex/total*100)+"%";
                document.getElementById('progress-text').innerText = `進度：${gameState.currentIndex+1} / ${total}`;
            }
        }

        const inputObj = document.getElementById('input-box');

        inputObj.addEventListener('input', () => {
            if (gameState.mode !== 'word' || !gameState.active) return;
            // 只允許英文字母、數字、空格、連字號、撇號
            const validValue = inputObj.value.replace(/[^a-zA-Z0-9\s\-\']/g, '');
            if (inputObj.value !== validValue) inputObj.value = validValue;
            renderWord();
        });

        inputObj.addEventListener('keydown', (e) => {
            if (gameState.mode !== 'word' || !gameState.active || gameState.examMode) return;
            const word = gameState.currentList[gameState.currentIndex] || "";
            const currentIn = inputObj.value;
            if (e.key === 'Backspace' || e.key === 'Enter' || e.key === 'Tab') return;
            if (e.key.length === 1) {
                const isValidKey = /^[a-zA-Z0-9\s\-\']$/.test(e.key);
                if (isValidKey) {
                    const targetChar = word[currentIn.length];
                    if (!targetChar || e.key.toLowerCase() !== targetChar.toLowerCase()) {
                        e.preventDefault();
                        const wordDisp = document.getElementById('word-display');
                        wordDisp.classList.remove('shake-error');
                        void wordDisp.offsetWidth;
                        wordDisp.classList.add('shake-error');
                        playErrorSound();
                        updateErrorVisual(currentIn.length);
                    }
                } else {
                    e.preventDefault();
                }
            }
        });

        function updateErrorVisual(errorIndex) {
            const word = gameState.currentList[gameState.currentIndex] || "";
            const userIn = document.getElementById('input-box').value;
            let html = "";
            for (let i=0; i<word.length; i++) {
                const char = word[i];
                const userInputChar = userIn[i];
                if (char === ' ') {
                    html += `<div class="char-box space">&nbsp;</div>`;
                } else {
                    let content = "", className = "";
                    if (i === errorIndex) { content = char; className = "char-wrong"; }
                    else if (userInputChar !== undefined) {
                        content = userInputChar;
                        className = (userInputChar === char) ? "char-correct" : "char-wrong";
                    } else { content = gameState.testMode ? "&nbsp;" : char; }
                    html += `<div class="char-box"><span class="${className}">${content}</span></div>`;
                }
            }
            document.getElementById('word-display').innerHTML = html;
        }

        inputObj.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && gameState.mode === 'word' && gameState.active) {
                const target = gameState.currentList[gameState.currentIndex];
                const userVal = inputObj.value.trim().toLowerCase();
                const targetLower = target.toLowerCase();
                if (gameState.examMode) {
                    if (userVal === targetLower) gameState.score++;
                    else gameState.examErrors.push(target);
                    nextItem();
                } else {
                    if (userVal === targetLower) { gameState.score++; nextItem(); }
                    else {
                        const wordDisp = document.getElementById('word-display');
                        wordDisp.classList.remove('shake-error');
                        void wordDisp.offsetWidth;
                        wordDisp.classList.add('shake-error');
                        playErrorSound();
                    }
                }
            }
        });

        function nextItem() {
            document.getElementById('word-display').classList.remove('shake-error');
            playCorrectSound();
            const wordDisp = document.getElementById('word-display');
            wordDisp.classList.remove('pop-anim');
            void wordDisp.offsetWidth;
            wordDisp.classList.add('pop-anim');
            setTimeout(() => wordDisp.classList.remove('pop-anim'), 300);

            gameState.currentIndex++;
            inputObj.value = "";

            if (gameState.subMode === 'random') {
                if (gameState.currentIndex >= gameState.currentList.length) {
                    gameState.currentList = [...dict[gameState.currentDifficulty]].sort(() => Math.random()-0.5);
                    gameState.currentIndex = 0;
                }
                document.getElementById('counter-display').innerText = `正確：${gameState.score}`;
                renderWord(); speakCurrent();
            } else {
                if (gameState.currentIndex < gameState.currentList.length) { renderWord(); speakCurrent(); }
                else endGame();
            }
        }

        window.addEventListener('keydown', (e) => {
            if (!gameState.active || gameState.mode !== 'beginner' || e.target.tagName === 'INPUT') return;
            if (isCoolingDown) return;
            if (e.key.toUpperCase() === gameState.targetChar) {
                gameState.score++;
                playCorrectSound();
                document.getElementById('counter-display').innerText = `得分：${gameState.score}`;
                nextChar();
            } else if (!['SHIFT','CONTROL','ALT','CAPSLOCK','TAB','META','ENTER','BACKSPACE'].includes(e.key.toUpperCase())) {
                triggerKeyboardShake();
            }
        });

        function endGame() {
            gameState.active = false;
            if (gameState.timer) {
                clearInterval(gameState.timer);
                gameState.timer = null;
            }

            // 考試模式：錯題加入待複習清單
            if (gameState.examErrors.length > 0) {
                addToReviewList(gameState.examErrors);
            }

            const detail = document.getElementById('result-detail');
            const layer = document.getElementById('result-layer');
            const examBox = document.getElementById('exam-results-box');
            const reTestBtn = document.getElementById('re-test-errors-btn');
            examBox.style.display = 'none'; reTestBtn.style.display = 'none';

            if (gameState.mode === 'beginner') {
                detail.innerHTML = `抓到字母：<span style="color:var(--primary); font-size:2.5rem;">${gameState.score}</span> 個`;
            } else if (gameState.subMode === 'random') {
                detail.innerHTML = `完成單字：<span style="color:var(--primary);">${gameState.score}</span> 個`;
            } else {
                if (gameState.examMode) {
                    const total = gameState.currentList.length;
                    const pct = total > 0 ? Math.round(gameState.score / total * 100) : 0;
                    detail.innerHTML = `🎓 考試模式結束！<br>答對率：${pct}% (${gameState.score}/${total})`;
                    if (gameState.examErrors.length > 0) {
                        examBox.style.display = 'block'; reTestBtn.style.display = 'inline-block';
                        let errorHtml = `<h4 style="margin:0 0 10px 0; color:var(--wrong);">❌ 需要加強的單字（已加入待複習清單）：</h4>`;
                        [...new Set(gameState.examErrors)].forEach(eng => {
                            const chi = gameState.tempDictionary[eng] || dictionary[eng] || dictionary[eng.toLowerCase()] || "";
                            errorHtml += `<div class="error-item"><span class="error-eng">${eng}</span><span class="error-chi">${chi}</span></div>`;
                        });
                        examBox.innerHTML = errorHtml;
                    } else {
                        detail.innerHTML += `<br><span style="color:var(--correct);">太棒了！全對！滿分！💯</span>`;
                    }
                } else {
                    detail.innerHTML = `🎉 恭喜完成這份清單！<br><span style="color:var(--correct);">表現得非常出色喔！</span>`;
                }
            }
            layer.style.display = 'flex';
        }

        // ★ 核心修正：confirmRandomChallenge 同時存 pendingTimeLeft
        function confirmRandomChallenge() {
            const mins = parseInt(document.getElementById('random-minutes').value) || 1;
            hideModal('random-modal');
            closeSidebar(); clearUI();
            gameState.mode = 'word'; gameState.subMode = 'random';
            gameState.pendingTimeLeft = mins * 60;  // ★ 存入，不直接設 timeLeft
            const titleMap = { easy: "🌱 簡單模式", normal: "🌿 基礎模式", hard: "🌳 困難模式" };
            document.getElementById('pre-title').innerText = titleMap[gameState.currentDifficulty];
            document.getElementById('pre-desc').innerText = `設定：${mins} 分鐘，準備好了嗎？`;
            document.getElementById('pre-game-start').style.display = 'block';
        }
    </script>
</body>
</html>
