<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小亞諾英文單字王</title>
    <style>
        :root {
            --primary: #3B7FB9; 
            --secondary: #B5EAD7;
            --accent: #FFDAC1; 
            --correct: #2ecc71;
            --wrong: #e74c3c;
            --text: #444;
            --key-base-width: 60px;
            
            /* 指法顏色 - 淺色調 */
            --finger-l4: #FFD1DC; /* 左小指 */
            --finger-l3: #FFECB3; /* 左無名 */
            --finger-l2: #C8E6C9; /* 左中指 */
            --finger-l1: #BBDEFB; /* 左食指 */
            --finger-r1: #D1C4E9; /* 右食指 */
            --finger-r2: #F8BBD0; /* 右中指 */
            --finger-r3: #DCEDC8; /* 右無名 */
            --finger-r4: #E0F2F1; /* 右小指 */
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            background-color: #EBF5FB;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.2s;
        }

        .menu-toggle {
            position: fixed; left: 20px; top: 20px; font-size: 30px; cursor: pointer;
            z-index: 2000; background: white; border: none;
            color: var(--primary); border-radius: 50%; width: 55px; height: 55px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #sidebar {
            width: 280px; height: 100vh; background-color: white;
            box-shadow: 4px 0 20px rgba(0,0,0,0.15);
            position: fixed; left: -350px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1500; display: flex; flex-direction: column;
        }
        #sidebar.open { left: 0; }
        
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin-top: 60px;
            border-bottom: 1px solid #EEE;
        }
        .home-icon-btn {
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 10px;
            transition: 0.2s;
        }
        .home-icon-btn:hover { background: #F0F0F0; transform: scale(1.1); }

        .sidebar-content {
            flex-grow: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px; scrollbar-width: none;
        }
        .sidebar-content::-webkit-scrollbar { display: none; }

        .btn {
            width: 100%; background-color: var(--secondary); border: none; padding: 15px;
            border-radius: 15px; font-size: 1.1rem; cursor: pointer; font-weight: bold;
            color: #4A7C6E; box-shadow: 0 4px 0 #95CBB9; margin-bottom: 5px; flex-shrink: 0;
            font-family: inherit;
        }

        #main-view { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; width: 100%; }

        #home-logo { text-align: center; }
        .logo-icon { 
            font-size: 10rem; 
            margin-bottom: 20px; 
            display: block;
            filter: drop-shadow(0 10px 10px rgba(59,127,185,0.3));
            animation: swim 3s infinite ease-in-out;
        }
        .logo-text { 
            font-size: 4.5rem; 
            font-weight: 900; 
            color: #3B7FB9;
            text-shadow: 3px 3px 0px #FFDAC1, 6px 6px 0px rgba(0,0,0,0.05);
        }
        @keyframes swim {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        #top-info-bar { position: absolute; top: 30px; width: 80%; display: flex; justify-content: space-between; align-items: center; }
        #total-progress-container { width: 60%; height: 25px; background: #EEE; border-radius: 20px; overflow: hidden; border: 3px solid #DDD; display: none; }
        #total-progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }
        #timer-display { font-size: 2rem; font-weight: bold; color: #FF6B6B; display: none; }
        #counter-display { font-size: 2rem; font-weight: bold; color: #3B7FB9; display: none; }

        #word-area { text-align: center; width: 100%; display: none; }
        
        #word-display { 
            font-size: 8vw; 
            max-font-size: 100px; 
            font-weight: bold; 
            margin-bottom: 10px; 
            color: #ddd; 
            transition: color 0.2s;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .char-box {
            display: inline-block;
            min-width: 0.8em;
            border-bottom: 6px solid #DDD; 
            text-align: center;
            line-height: 1.1;
        }
        .char-box.space { border-bottom: none; min-width: 0.4em; }

        #translation-display { font-size: 2.2rem; color: #777; margin-bottom: 25px; font-weight: bold; height: 3rem; }

        .char-correct { color: var(--correct); }
        .char-wrong { color: var(--wrong) !important; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .shake-kb { animation: shake 0.3s ease-in-out; }
        .shake-error { animation: shake 0.3s ease-in-out; }

        #input-box { font-size: 2.5rem; padding: 12px 30px; border-radius: 60px; border: 6px solid var(--primary); outline: none; text-align: center; width: 85%; max-width: 450px; background: white; font-family: inherit; }

        #keyboard-area { display: none; text-align: center; width: 100%; max-width: 1000px; }
        .keyboard { display: flex; flex-direction: column; gap: 8px; background: #ddd; padding: 15px; border-radius: 20px; border: 4px solid #bbb; }
        .kb-row { display: flex; gap: 6px; justify-content: center; }
        .key {
            width: 55px; height: 55px; background: white; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: bold;
            border-bottom: 5px solid #aaa; position: relative; transition: all 0.2s;
            color: #555;
        }
        .key.f-key::after, .key.j-key::after { content: ''; position: absolute; bottom: 10px; left: 50%; width: 18px; height: 3px; background: #999; transform: translateX(-50%); border-radius: 2px; }
        
        .key.highlight { 
            background: #FF4D4D !important; 
            color: white !important; 
            border-color: #B30000; 
            transform: scale(1.25); 
            z-index: 10;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.6);
            border-bottom-width: 2px;
        }

        #pre-game-start { text-align: center; background: white; padding: 40px; border-radius: 30px; border: 8px solid var(--accent); display: none; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 2500; }
        .modal-content { 
            background: white; padding: 30px; border-radius: 35px; width: 85%; max-width: 480px; text-align: center; border: 10px solid var(--accent);
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
        }
        #result-layer { display: none; position: fixed; background: rgba(255,255,255,0.98); width: 100%; height: 100%; top:0; left:0; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; text-align: center; overflow-y: auto; }

        .word-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .word-row input { padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 42%; font-size: 1rem; font-family: inherit; }
        
        #saved-lists-display {
            padding-top: 10px;
            display: flex;
            flex-direction: column;
        }

        /* 穩定 Hover 動畫，避免閃現 */
        .list-item { 
            background: white; 
            border: 2px solid var(--secondary); 
            padding: 12px; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-weight: bold; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            position: relative; 
            z-index: 1;
            /* 使用更平滑穩定的 transition，並啟用硬件加速預留 */
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            will-change: transform;
        }
        .list-item:hover { 
            background: #f9f9f9; 
            transform: translateY(-8px); 
            z-index: 100; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); 
        }
        .delete-btn { color: #e74c3c; cursor: pointer; font-size: 1.2rem; border: none; background: none; padding: 5px; }

        input[type="number"] { font-family: inherit; border: 2px solid var(--primary); border-radius: 10px; padding: 5px; color: var(--primary); font-weight: bold; }
        
        #exam-results-box { width: 80%; max-width: 500px; background: #fff; border: 4px solid var(--accent); border-radius: 20px; padding: 15px; margin: 15px 0; text-align: left; }
        .error-item { margin-bottom: 10px; border-bottom: 1px dashed #ddd; padding-bottom: 5px; }
        .error-eng { color: var(--wrong); font-weight: bold; font-size: 1.4rem; }
        .error-chi { color: #888; margin-left: 10px; }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <div id="sidebar">
        <div class="sidebar-header">
            <span style="font-weight: bold; color: var(--primary);">🐳 冒險選單</span>
            <span class="home-icon-btn" onclick="location.reload()">🏠</span>
        </div>
        <div class="sidebar-content">
            <div style="color:#BBB; font-size:0.8rem;">找字母練習</div>
            <button class="btn" style="background: var(--accent);" onclick="prepareBeginnerMode()">⌨️ 初心者模式</button>
            <div style="color:#BBB; font-size:0.8rem;">單字挑戰</div>
            <button class="btn" onclick="openRandomModal('easy')">🌱 簡單模式</button>
            <button class="btn" onclick="openRandomModal('normal')">🌿 基礎模式</button>
            <button class="btn" onclick="openRandomModal('hard')">🌳 困難模式</button>
            <div style="color:#BBB; font-size:0.8rem;">個人化學習</div>
            <button class="btn" style="background: #E2F0CB;" onclick="showCustomModal()">✏️ 自訂單字庫</button>
        </div>
    </div>

    <div id="main-view">
        <div id="top-info-bar">
            <div id="total-progress-container"><div id="total-progress-bar"></div></div>
            <div id="timer-display">時間：--:--</div>
            <div id="counter-display">正確：0</div>
        </div>

        <div id="home-logo">
            <div class="logo-icon">🐋</div>
            <div class="logo-text">小亞諾英文單字王</div>
            <p style="color: #5D8AA8; font-size: 1.5rem; margin-top: 20px; font-weight: bold;">點擊左上角 ☰ 開始練習吧！</p>
        </div>

        <div id="pre-game-start">
            <h1 id="pre-title" style="color: var(--primary); font-size: 3rem;"></h1>
            <p id="pre-desc" style="font-size: 1.2rem; color: #888;"></p>
            <button class="btn" style="width: 200px; font-size: 1.5rem;" onclick="actualStartGame()">出發！</button>
        </div>

        <div id="word-area">
            <div id="word-display">READY?</div>
            <div id="translation-display"></div>
            <div style="display: flex; align-items: center; gap: 20px; justify-content: center;">
                <input type="text" id="input-box" placeholder="點我開始" autocomplete="off">
                <span style="font-size: 3.5rem; cursor: pointer; user-select: none;" onclick="speakCurrent()">🔊</span>
            </div>
            <div id="progress-text" style="margin-top: 25px; font-weight: bold; font-size: 1.5rem; color: #888;"></div>
        </div>

        <div id="keyboard-area">
            <h1 id="kb-target" style="font-size: 6rem; color: #FF4D4D; margin-top: 0; margin-bottom: 20px;">?</h1>
            <div class="keyboard" id="virtual-keyboard"></div>
        </div>
    </div>

    <div id="random-modal" class="modal">
        <div class="modal-content">
            <h3 id="random-title" style="color: var(--primary); font-size: 2rem; margin-top: 0;">模式</h3>
            <p style="font-size: 1.3rem; font-weight: bold; color: #666;">設定時間 (分鐘)：<br><br>
                <input type="number" id="random-minutes" value="1" min="1" max="60" style="width:80px; font-size:1.8rem; text-align:center;">
            </p>
            <button class="btn" style="margin-top: 15px;" onclick="confirmRandomChallenge()">準備好了！</button>
            <button class="btn" style="background:#eee; margin-top:10px; color: #888; box-shadow: 0 4px 0 #ccc;" onclick="hideRandomModal()">關閉</button>
        </div>
    </div>
    
    <div id="custom-modal" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--primary); font-size: 1.8rem; margin-top: 0;">✏️ 自訂單字庫管理</h3>
            <div id="list-creation-area">
                <input type="text" id="new-list-name" placeholder="清單名稱 (如：第五課單字)" style="width:90%; padding:10px; margin-bottom:12px; border-radius:10px; border:2px solid var(--primary); font-size: 1rem; font-family: inherit;">
                <div id="custom-rows-container" style="max-height: 220px; overflow-y: auto; margin-bottom:12px; border: 1px solid #eee; padding: 10px; border-radius: 12px; background: #fafafa;">
                    <div class="word-row">
                        <input type="text" class="eng-in" placeholder="英文">
                        <input type="text" class="chi-in" placeholder="中文">
                        <button onclick="this.parentElement.remove()" style="border:none; background:none; cursor:pointer; color:#999;">❌</button>
                    </div>
                </div>
                <button class="btn" style="background: #E2F0CB; font-size: 0.9rem; padding: 10px;" onclick="addNewWordRow()">➕ 新增一列</button>
                <button class="btn" style="margin-top: 5px;" onclick="saveCustomList()">💾 儲存這份單字清單</button>
            </div>
            <hr style="margin: 15px 0; border: 0.5px solid #eee;">
            <h4 style="color: #666;">我的收藏清單</h4>
            <div id="saved-lists-display" style="max-height: 150px; overflow-y: auto; text-align: left;"></div>
            <button class="btn" style="background:#eee; margin-top:15px; padding: 10px; color: #888; box-shadow: 0 4px 0 #ccc;" onclick="hideCustomModal()">關閉視窗</button>
        </div>
    </div>

    <div id="mode-select-modal" class="modal">
        <div class="modal-content">
            <h3 id="selected-list-title" style="color: var(--primary); font-size: 1.8rem; margin-top: 0;">清單名稱</h3>
            <div style="margin: 20px 0; font-size: 1.2rem; font-weight: bold; color: #666;">
                設定練習次數：<input type="number" id="custom-repeat-count" value="1" min="1" style="width:70px; text-align:center; font-size: 1.2rem;">
            </div>
            <button class="btn" onclick="launchCustomMode('practice')">📖 基礎練習 </button>
            <button class="btn" style="background: var(--accent); color: #855b3f; box-shadow: 0 4px 0 #e6c5ae;" onclick="launchCustomMode('test')">📝 拼字練習 </button>
            <button class="btn" style="background: #D2E8F7; color: #3B7FB9; box-shadow: 0 4px 0 #B2CDDE;" onclick="launchCustomMode('exam')">🎓 考試模式 </button>
            <button class="btn" style="background:#eee; margin-top:10px; color: #888; box-shadow: 0 4px 0 #ccc;" onclick="document.getElementById('mode-select-modal').style.display='none'">取消</button>
        </div>
    </div>

    <div id="result-layer">
        <h1 style="font-size:6rem; margin:0;">🏁</h1>
        <h2 id="result-title" style="color: var(--primary); font-size: 2.5rem;">挑戰結束！</h2>
        <div id="result-detail" style="font-size:1.6rem; line-height:2; margin-bottom:10px; font-weight: bold; color: #555;"></div>
        <div id="exam-results-box" style="display:none;"></div>
        <div style="display:flex; gap:15px; flex-wrap: wrap; justify-content: center;">
            <button class="btn" style="width:180px;" onclick="actualStartGame()">再挑戰一次</button>
            <button id="re-test-errors-btn" class="btn" style="width:180px; background: var(--accent); display:none;" onclick="startErrorReTest()">僅測驗錯題</button>
            <button class="btn" style="width:180px; background:#ddd; color: #666; box-shadow: 0 4px 0 #bbb;" onclick="location.reload()">回到主畫面</button>
        </div>
    </div>

        function actualStartGame() {
            document.getElementById('pre-game-start').style.display = 'none';
            document.getElementById('result-layer').style.display = 'none';
            updateTimerDisplay();
            gameState.active = true;
            gameState.score = 0; 
            gameState.currentIndex = 0;
            if (gameState.mode === 'beginner') {
                document.getElementById('keyboard-area').style.display = 'block';
                document.getElementById('timer-display').style.display = 'block';
                document.getElementById('counter-display').style.display = 'block';
                document.getElementById('counter-display').innerText = "得分：0";
                initKeyboard(); nextChar(); startTimer();
            } else {
                document.getElementById('word-area').style.display = 'block';
                document.getElementById('input-box').value = "";
                if(gameState.subMode === 'random') {
                    document.getElementById('timer-display').style.display = 'block';
                    document.getElementById('counter-display').style.display = 'block';
                    document.getElementById('counter-display').innerText = "正確：0";
                    gameState.currentList = [...dict[gameState.currentDifficulty]].sort(()=>Math.random()-0.5);
                    startTimer();
                } else {
                    document.getElementById('total-progress-container').style.display = 'block';
                    document.getElementById('progress-text').style.display = 'block';
                }
                renderWord(); speakCurrent();
                setTimeout(() => document.getElementById('input-box').focus(), 300);
            }
        }

        function startTimer() {
            if(gameState.timer) clearInterval(gameState.timer);
            gameState.timer = setInterval(() => {
                gameState.timeLeft--;
                updateTimerDisplay();
                if (gameState.timeLeft <= 0) endGame();
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(gameState.timeLeft / 60); 
            const s = gameState.timeLeft % 60;
            const display = document.getElementById('timer-display');
            display.innerText = `時間：${m}:${s.toString().padStart(2, '0')}`;
        }

        function renderWord() {
            const word = gameState.currentList[gameState.currentIndex] || "";
            const userIn = document.getElementById('input-box').value;
            let html = "";
            for (let i = 0; i < word.length; i++) {
                const char = word[i];
                const userInputChar = userIn[i];
                
                if (char === ' ') {
                    html += `<div class="char-box space">&nbsp;</div>`;
                } else {
                    let content = "";
                    let className = "";
                    
                    if (userInputChar !== undefined) {
                        content = userInputChar;
                        if (!gameState.examMode) {
                            className = (userInputChar.toLowerCase() === char.toLowerCase()) ? "char-correct" : "char-wrong";
                        } else {
                            className = "char-normal";
                        }
                    } else {
                        content = gameState.testMode ? "&nbsp;" : char;
                    }
                    html += `<div class="char-box"><span class="${className}">${content}</span></div>`;
                }
            }
            document.getElementById('word-display').innerHTML = html;
            const trans = gameState.tempDictionary[word.toLowerCase()] || dictionary[word.toLowerCase()] || "(自定義)";
            document.getElementById('translation-display').innerText = trans;
            if (gameState.subMode === 'custom') {
                const total = gameState.currentList.length;
                document.getElementById('total-progress-bar').style.width = (gameState.currentIndex / total * 100) + "%";
                document.getElementById('progress-text').innerText = `進度：${gameState.currentIndex + 1} / ${total}`;
            }
        }

        const inputObj = document.getElementById('input-box');
        inputObj.addEventListener('keydown', (e) => {
            if (gameState.mode !== 'word' || !gameState.active || gameState.examMode) return;
            const word = gameState.currentList[gameState.currentIndex] || "";
            const currentIn = inputObj.value;
            if (e.key === 'Backspace' || e.key === 'Enter') return;
            const targetChar = word[currentIn.length];
            if (!targetChar || e.key.toLowerCase() !== targetChar.toLowerCase()) {
                if (e.key.length === 1) { 
                    e.preventDefault(); 
                    const wordDisp = document.getElementById('word-display');
                    wordDisp.classList.remove('shake-error');
                    void wordDisp.offsetWidth; 
                    wordDisp.classList.add('shake-error');
                    playErrorSound();
                    updateErrorVisual(currentIn.length);
                }
            }
        });

        function updateErrorVisual(errorIndex) {
            const word = gameState.currentList[gameState.currentIndex] || "";
            const userIn = document.getElementById('input-box').value;
            let html = "";
            for (let i = 0; i < word.length; i++) {
                const char = word[i];
                const userInputChar = userIn[i];
                
                if (char === ' ') {
                    html += `<div class="char-box space">&nbsp;</div>`;
                } else {
                    let content = "";
                    let className = "";
                    
                    if (i === errorIndex) {
                        content = char;
                        className = "char-wrong";
                    } else if (userInputChar !== undefined) {
                        content = userInputChar;
                        className = "char-correct";
                    } else {
                        content = gameState.testMode ? "&nbsp;" : char;
                    }
                    html += `<div class="char-box"><span class="${className}">${content}</span></div>`;
                }
            }
            document.getElementById('word-display').innerHTML = html;
        }

        inputObj.addEventListener('input', () => { if(gameState.mode === 'word') renderWord(); });
        inputObj.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && gameState.mode === 'word' && gameState.active) {
                const target = gameState.currentList[gameState.currentIndex]?.toLowerCase();
                const userVal = inputObj.value.trim().toLowerCase();
                if(gameState.examMode) {
                    if(userVal === target) gameState.score++;
                    else gameState.examErrors.push(gameState.currentList[gameState.currentIndex]);
                    nextItem();
                } else {
                    if (userVal === target) { gameState.score++; nextItem(); }
                    else {
                        const wordDisp = document.getElementById('word-display');
                        wordDisp.classList.remove('shake-error');
                        void wordDisp.offsetWidth; 
                        wordDisp.classList.add('shake-error');
                        playErrorSound();
                    }
                }
            }
        });

        function nextItem() {
            document.getElementById('word-display').classList.remove('shake-error');
            gameState.currentIndex++; 
            inputObj.value = "";
            if (gameState.subMode === 'random') {
                if (gameState.currentIndex >= gameState.currentList.length) { 
                    gameState.currentList = [...dict[gameState.currentDifficulty]].sort(()=>Math.random()-0.5); 
                    gameState.currentIndex = 0; 
                }
                document.getElementById('counter-display').innerText = `正確：${gameState.score}`;
                renderWord(); speakCurrent();
            } else {
                if (gameState.currentIndex < gameState.currentList.length) { 
                    renderWord(); speakCurrent(); 
                } else endGame();
            }
        }

        window.addEventListener('keydown', (e) => {
            if (!gameState.active || gameState.mode !== 'beginner' || e.target.tagName === 'INPUT') return;
            if (isCoolingDown) return;
            if (e.key.toUpperCase() === gameState.targetChar) {
                gameState.score++; 
                document.getElementById('counter-display').innerText = `得分：${gameState.score}`;
                nextChar();
            } else if (!['SHIFT','CONTROL','ALT','CAPSLOCK','TAB','META','ENTER'].includes(e.key.toUpperCase())) {
                triggerKeyboardShake();
            }
        });

        function endGame() {
            gameState.active = false;
            if(gameState.timer) clearInterval(gameState.timer);
            const detail = document.getElementById('result-detail');
            const layer = document.getElementById('result-layer');
            const examBox = document.getElementById('exam-results-box');
            const reTestBtn = document.getElementById('re-test-errors-btn');
            examBox.style.display = 'none'; reTestBtn.style.display = 'none';

            if (gameState.mode === 'beginner') {
                detail.innerHTML = `抓到字母：<span style="color:var(--primary); font-size:2.5rem;">${gameState.score}</span> 個`;
            } else if (gameState.subMode === 'random') {
                detail.innerHTML = `完成單字：${gameState.score} 個`;
            } else {
                if (gameState.examMode) {
                    detail.innerHTML = `🎓 考試模式結束！<br>答對率：${Math.round(gameState.score / gameState.currentList.length * 100)}% (${gameState.score}/${gameState.currentList.length})`;
                    if(gameState.examErrors.length > 0) {
                        examBox.style.display = 'block'; reTestBtn.style.display = 'block';
                        let errorHtml = `<h4 style="margin:0 0 10px 0; color:var(--wrong);">❌ 需要加強的單字：</h4>`;
                        gameState.examErrors.forEach(eng => {
                            const chi = gameState.tempDictionary[eng.toLowerCase()] || "";
                            errorHtml += `<div class="error-item"><span class="error-eng">${eng}</span><span class="error-chi">${chi}</span></div>`;
                        });
                        examBox.innerHTML = errorHtml;
                    } else {
                        detail.innerHTML += `<br><span style="color:var(--correct);">太棒了！全對！滿分！💯</span>`;
                    }
                } else {
                    detail.innerHTML = `🎉 恭喜完成這份清單！<br><span style="color:var(--correct);">表現得非常出色喔！</span>`;
                }
            }
            layer.style.display = 'flex';
        }

        function confirmRandomChallenge() {
            const mins = parseInt(document.getElementById('random-minutes').value) || 1;
            hideRandomModal(); toggleSidebar(); clearUI();
            gameState.mode = 'word'; gameState.subMode = 'random';
            gameState.timeLeft = mins * 60;
            const titleMap = { easy: "🌱 簡單模式", normal: "🌿 基礎模式", hard: "🌳 困難模式" };
            document.getElementById('pre-title').innerText = titleMap[gameState.currentDifficulty];
            document.getElementById('pre-desc').innerText = `設定：${mins} 分鐘，準備好了嗎？`;
            document.getElementById('pre-game-start').style.display = 'block';
        }
    </script>
</body>
</html>
